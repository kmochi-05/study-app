<!DOCTYPE html>
<html>
<head>
    <title>学習記録アプリ</title>
</head>
<body>
    <h1>学習記録アプリ</h1>
    
    <form action="/add" method="post">
        <label>科目：</label>
        <input type="text" name="subject"><br>

        <label>時間（hour）：</label>
        <input type="number" name="time"><br>

        <label>日付：</label>
        <input type="date" name="date"><br>

        <button type="submit">記録する</button>
        </form>

        <h2>学習記録一覧</h2>

        <table border="1">
            <tr>
                <th>科目</th>
                <th>時間</th>
                <th>日付</th>
                <th>操作</th>
            </tr>
            {% for record in records %}
            <tr>
                <td>{{ record[1] }}</td>
                <td>{{ record[2] }}</td>
                <td>{{ record[3] }}</td>
                <td>
                    <form action="/delete/{{ record[0] }}" method="post">
                        <button type="submit">削除</button>
                    </form>
                </td>
            </tr>
            {% endfor %}

        <p>合計学習時間: {{ total }} 時間</p>
        </table>
</body>
</html>
